<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡塔音乐 — 多平台音乐搜索下载 | 网易云·酷狗·酷我</title>
<meta name="description" content="卡塔音乐下载器，支持网易云音乐、酷狗、酷我等多平台歌曲搜索、在线播放、MP3下载、LRC歌词翻译和NCM文件解密。">
<meta name="keywords" content="音乐下载,MP3下载,网易云,酷狗,酷我,NCM解密,歌词翻译,在线音乐">
<meta property="og:title" content="卡塔音乐 — 多平台音乐下载器">
<meta property="og:description" content="免费在线搜索和下载高品质音乐，支持多平台，无需登录">
<meta property="og:type" content="website">
<meta name="robots" content="index, follow">
<link rel="stylesheet" href="{{ url_for("static", filename="css/style.css") }}">
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-logo">
      <span>🎵 卡塔音乐</span>
      <div><small>制作人：卡塔biubiubiu | QQ：3424409635</small></div>
    </div>
    <div class="header-search">
      <input type="text" id="searchInput" placeholder="搜索歌曲、歌手..." autofocus>
      <button class="header-search-btn" onclick="doSearch(1)">🔍</button>
    </div>
    <div class="header-info">
      <button class="about-btn" onclick="openAbout()">
        💛 了解更多
        <span class="about-subtitle">（广告投放）</span>
      </button>
    </div>
  </div>
</div>

<div id="runtimeWarning" style="
  background: linear-gradient(90deg, #2a1215, #1a1a1a, #1a1a2e);
  border-bottom: 2px solid #ff4d4f;
  padding: 8px 20px;
  text-align: center;
  font-size: 13px;
  color: #ffa39e;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
">
  <span style="font-size:16px">🈲</span>
  <span style="font-weight:700;color:#ff4d4f;" id="warnText">
    请勿关闭命令行窗口！关闭后音乐下载器将停止运行
  </span>
  <span style="font-size:16px">🈲</span>
  <button onclick="var w=document.getElementById('runtimeWarning');w.style.display='none';localStorage.setItem('warnDismissed','1')"
    style="background:none;border:none;color:#8c8c8c;cursor:pointer;font-size:16px;padding:0 4px;margin-left:4px;"
    title="关闭提示">&times;</button>
</div>

<div class="platform-bar">
  <div class="platform-bar-inner" id="platformTabs">
    {% for key, p in platforms.items() %}
    <button class="platform-tab{% if key == 'netease' %} active{% endif %}" data-platform="{{ key }}">
      {{ p.icon }} {{ p.name }}
    </button>
    {% endfor %}
  </div>
</div>

<div class="container">
  <div class="search-bar">
    <button class="mode-btn active" data-sort="name" onclick="switchSort('name',this)">按名称</button>
    <button class="mode-btn" data-sort="heat" onclick="switchSort('heat',this)">🔥 按热度</button>
    <button class="mode-btn" onclick="switchSection('ncm')">🔓 NCM解密</button>
    <span class="extra-link"></span>
  </div>

  <div class="upload-zone" id="ncmZone" style="display:none">
    <p>📂 点击或拖拽 .ncm 文件到这里解密</p>
    <p style="font-size:11px;color:#434343;">自动识别 FLAC/MP3 · 支持批量</p>
    <input type="file" id="ncmFile" accept=".ncm" multiple>
  </div>

  <div style="text-align:center;font-size:12px;color:#595959;margin-bottom:12px" id="resultCount"></div>
  <ul class="song-list" id="songList"></ul>
  <div id="loadingArea" class="loading" style="display:none"><div class="spinner"></div><p>搜索中...</p></div>
  <div id="emptyState" class="empty"><div class="icon">🎧</div><p>输入关键词搜索音乐</p></div>
  <div class="pagination" id="pagination" style="display:none"></div>
</div>

<div class="player-bar" id="playerBar">
  <img class="player-cover" id="playerCover" src="" alt="">
  <div class="player-info">
    <div class="p-title" id="playerTitle">未在播放</div>
    <div class="p-artist" id="playerArtist">—</div>
  </div>
  <div class="player-lyrics" id="playerLyrics">
    <div class="player-lyrics-line player-lyrics-current" id="playerLyricsCurrent"></div>
    <div class="player-lyrics-line player-lyrics-next" id="playerLyricsNext"></div>
  </div>
  <div class="player-controls">
    <button onclick="playerPrev()" title="上一首">⏮</button>
    <button class="play-btn" id="playerPlayBtn" onclick="playerToggle()">▶️</button>
    <button onclick="playerNext()" title="下一首">⏭</button>
  </div>
  <div class="player-progress">
    <span class="player-time" id="playerCurTime">00:00</span>
    <input type="range" id="playerSeek" min="0" max="100" value="0" oninput="playerSeekTo(this.value)">
    <span class="player-time" id="playerDur">00:00</span>
  </div>
  <div class="player-volume">
    <span style="font-size:14px;flex-shrink:0">🔊</span>
    <input type="range" id="playerVol" min="0" max="100" value="70" oninput="playerSetVol(this.value)">
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="{{ url_for("static", filename="js/app.js") }}"></script>

<button class="back-to-top" id="backToTop" title="回到顶部" aria-label="回到顶部" onclick="scrollToTop()">⬆</button>

<div class="lyrics-modal-overlay" id="lyricsModal" onclick="closeLyricsModal(event)">
  <div class="lyrics-modal-dialog">
    <div class="lyrics-modal-header">
      <span class="lyrics-modal-title" id="lyricsModalTitle">歌词预览</span>
      <button class="lyrics-modal-close" onclick="closeLyricsModal()" title="关闭">&times;</button>
    </div>
    <div class="lyrics-modal-body" id="lyricsModalBody">
      <div style="text-align:center;padding:20px;color:#8c8c8c;"><div class="spinner"></div><p>加载歌词中...</p></div>
    </div>
  </div>
</div>

<div class="about-overlay" id="aboutOverlay" onclick="closeAbout(event)">
  <div class="about-dialog">
    <img src="{{ url_for('static', filename='img/praise.png') }}" alt="赞赏码" onerror="this.alt='赞赏码图片加载失败'">
    <div class="about-text">赞赏作者再添加QQ进行浅入交流❤</div>
    <button class="about-close" onclick="closeAbout()">知道了</button>
  </div>
</div>

</body>
</html>
