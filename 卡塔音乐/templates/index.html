<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音乐下载器 — 多平台音乐搜索下载</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#141414;color:#d9d9d9;min-height:100vh}
a{color:#fa8c16;text-decoration:none}
a:hover{color:#ffa940}
code{background:#262626;padding:2px 6px;border-radius:3px;font-size:12px;color:#fa8c16}
input{background:#1f1f1f;color:#d9d9d9;border:1px solid #333}

.header{background:#141414;border-bottom:1px solid #262626;padding:12px 0;position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:16px}
.header-logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.header-logo img{width:32px;height:32px;border-radius:6px}
.header-logo span{font-size:18px;font-weight:700;color:#fff}
.header-logo small{font-size:10px;color:#8c8c8c;display:block;line-height:1}
.header-search{flex:1;max-width:700px;display:flex;gap:6px}
.header-search input{width:100%;padding:10px 16px;border-radius:20px;font-size:14px;outline:none;border:1px solid #333;background:#1f1f1f;color:#d9d9d9;transition:border-color .2s}
.header-search input:focus{border-color:#fa8c16}
.header-search input::placeholder{color:#595959}
.header-search-btn{padding:10px 16px;border:none;border-radius:50%;background:#fa8c16;color:#fff;cursor:pointer;font-size:16px;transition:all .15s;flex-shrink:0}
.header-search-btn:hover{background:#ffa940;transform:scale(1.05)}
.header-info{flex-shrink:0;font-size:11px;color:#8c8c8c;text-align:right;line-height:1.4}
.about-btn{padding:7px 16px;border:1px solid #fa8c16;border-radius:16px;background:rgba(250,140,22,.1);color:#fa8c16;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap}
.about-btn:hover{background:#fa8c16;color:#fff;box-shadow:0 0 12px rgba(250,140,22,.4);transform:scale(1.05)}

/* About modal */
.about-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.about-overlay.show{opacity:1;pointer-events:auto}
.about-dialog{background:#1f1f1f;border:1px solid #333;border-radius:14px;padding:28px 32px;text-align:center;max-width:380px;width:90%;transform:translateY(20px);transition:transform .3s}
.about-overlay.show .about-dialog{transform:translateY(0)}
.about-dialog img{max-width:100%;border-radius:10px;margin-bottom:16px}
.about-dialog .about-text{font-size:15px;color:#fa8c16;font-weight:500;margin-bottom:20px}
.about-dialog .about-close{padding:8px 28px;border:none;border-radius:18px;background:#fa8c16;color:#fff;cursor:pointer;font-size:14px;font-weight:600;transition:all .15s}
.about-dialog .about-close:hover{background:#ffa940;transform:scale(1.03)}

.platform-bar{background:#1a1a1a;border-bottom:1px solid #262626;padding:0}
.platform-bar-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.platform-bar-inner::-webkit-scrollbar{display:none}
.platform-tab{padding:8px 12px;border:none;border-radius:6px 6px 0 0;background:transparent;color:#8c8c8c;cursor:pointer;font-size:13px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.platform-tab:hover{color:#d9d9d9;background:#262626}
.platform-tab.active{color:#fa8c16;background:#141414;font-weight:600}

.container{max-width:1200px;margin:0 auto;padding:0 20px 120px}

.search-bar{padding:16px 0;display:flex;gap:8px;align-items:center}
.search-bar .mode-btn{padding:6px 14px;border:1px solid #333;border-radius:14px;background:transparent;color:#8c8c8c;cursor:pointer;font-size:12px;transition:all .15s}
.search-bar .mode-btn:hover{color:#d9d9d9;border-color:#595959}
.search-bar .mode-btn.active{background:#fa8c16;color:#fff;border-color:#fa8c16}
.search-bar .extra-link{font-size:12px;color:#595959;margin-left:auto}

.song-list{list-style:none}
.song-item{background:#1a1a1a;border-radius:8px;margin-bottom:6px;overflow:hidden;transition:background .2s;border:1px solid transparent}
.song-item:hover{background:#1f1f1f;border-color:#333}
.song-item.expanded{background:#1f1f1f;border-color:#fa8c16}

.song-row{display:flex;align-items:center;padding:10px 14px;gap:12px;cursor:pointer;user-select:none}
.song-idx{width:24px;text-align:center;font-size:12px;color:#595959;flex-shrink:0}
.song-cover{width:40px;height:40px;border-radius:4px;object-fit:cover;background:#262626;flex-shrink:0}
.song-info{flex:1;min-width:0}
.song-info .title{font-size:14px;font-weight:500;color:#d9d9d9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.song-info .meta{font-size:12px;color:#8c8c8c;margin-top:1px}
.song-platform-tag{font-size:10px;background:#262626;color:#fa8c16;padding:2px 8px;border-radius:10px;flex-shrink:0}
.song-heat{font-size:11px;color:#ff7a45;flex-shrink:0;margin-right:2px;white-space:nowrap}
.song-arrow{font-size:10px;color:#595959;transition:transform .2s;flex-shrink:0}
.song-item.expanded .song-arrow{transform:rotate(180deg);color:#fa8c16}

.song-detail{display:none;padding:0 14px 14px;border-top:1px solid #262626}
.song-item.expanded .song-detail{display:block}

.detail-actions{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
.btn{padding:8px 18px;border:none;border-radius:18px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#fa8c16;color:#fff}
.btn-primary:hover{background:#ffa940;transform:scale(1.02)}
.btn-outline{background:transparent;color:#fa8c16;border:1px solid #fa8c16}
.btn-outline:hover{background:rgba(250,140,22,.1)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

.detail-url{font-size:11px;color:#595959;margin:6px 0;word-break:break-all}
.detail-url a{color:#8c8c8c}

.lyrics-panel{display:none;margin-top:8px;padding:12px;background:#141414;border-radius:6px;max-height:160px;overflow-y:auto;font-size:12px;line-height:1.8;white-space:pre-wrap;color:#8c8c8c;border:1px solid #262626}
.lyrics-panel.show{display:block}

.player-bar{position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;border-top:1px solid #333;padding:8px 20px;z-index:200;display:flex;align-items:center;gap:16px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1)}
.player-bar.visible{transform:translateY(0)}
.player-cover{width:44px;height:44px;border-radius:6px;object-fit:cover;background:#262626;flex-shrink:0}
.player-info{flex:1;min-width:0}
.player-info .p-title{font-size:14px;color:#d9d9d9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-info .p-artist{font-size:12px;color:#8c8c8c}
.player-controls{display:flex;align-items:center;gap:12px;flex-shrink:0}
.player-controls button{background:transparent;border:none;color:#d9d9d9;cursor:pointer;font-size:20px;padding:4px;transition:color .15s}
.player-controls button:hover{color:#fa8c16}
.player-controls .play-btn{font-size:32px}
.player-progress{flex:1;max-width:240px;flex-shrink:0;display:flex;align-items:center;gap:8px}
.player-progress input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:linear-gradient(to right,#fa8c16 0%,#fa8c16 var(--seek-pct,0%),#333 var(--seek-pct,0%),#333 100%);border-radius:2px;outline:none}
.player-progress input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fa8c16;cursor:pointer;margin-top:-4px}
.player-progress input[type=range]::-moz-range-progress{background:#fa8c16;height:4px;border-radius:2px}
.player-time{font-size:11px;color:#595959;flex-shrink:0;min-width:40px;text-align:right;margin-right:6px}
.player-volume{display:flex;align-items:center;gap:4px;flex-shrink:0;padding-left:8px}
.player-volume input[type=range]{width:60px;accent-color:#fa8c16}

.upload-zone{border:2px dashed #333;border-radius:10px;padding:30px;text-align:center;color:#595959;cursor:pointer;transition:all .2s;margin:16px 0}
.upload-zone:hover,.upload-zone.drag-over{border-color:#fa8c16;color:#fa8c16;background:#1a1a1a}
.upload-zone input{display:none}

/* Translation language selector */
.lrc-lang-select{background:#1f1f1f;color:#d9d9d9;border:1px solid #fa8c16;border-radius:14px;padding:5px 10px;font-size:12px;cursor:pointer;outline:none;transition:border-color .15s}
.lrc-lang-select:hover{border-color:#ffa940}
.lrc-lang-select:focus{border-color:#ffa940;box-shadow:0 0 0 2px rgba(250,140,22,.2)}
.lrc-lang-select option{background:#1f1f1f;color:#d9d9d9}

/* Translation progress bar */
.lrc-progress{display:none;margin-top:6px;background:#141414;border-radius:8px;overflow:hidden;height:6px;border:1px solid #262626}
.lrc-progress.active{display:block}
.lrc-progress .bar{height:100%;width:0%;background:linear-gradient(90deg,#fa8c16,#ffa940);border-radius:8px;animation:lrc-progress-indeterminate 1.5s ease-in-out infinite}
@keyframes lrc-progress-indeterminate{0%{width:0%;margin-left:0}50%{width:70%;margin-left:15%}100%{width:0%;margin-left:100%}}
.lrc-progress .label{font-size:10px;color:#8c8c8c;text-align:center;padding:2px 0;display:none}
.lrc-progress.active .label{display:block}

.loading{text-align:center;padding:60px 20px;color:#595959}
.spinner{display:inline-block;width:28px;height:28px;border:2px solid #333;border-top-color:#fa8c16;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:#595959}
.empty .icon{font-size:40px;margin-bottom:8px}

.error-box{background:#2a1215;border:1px solid #5c1a1a;border-radius:8px;padding:20px;margin:12px 0;color:#ffa39e}
.error-box h3{color:#ff4d4f;margin-bottom:8px}
.error-box .sol{background:#141414;border-radius:6px;padding:10px;margin:6px 0;font-size:12px}

.pagination{display:flex;justify-content:center;gap:6px;margin-top:16px}
.pagination button{padding:6px 14px;border:1px solid #333;border-radius:16px;background:transparent;color:#d9d9d9;cursor:pointer;font-size:12px}
.pagination button:hover{border-color:#fa8c16;color:#fa8c16}
.pagination button:disabled{opacity:.3;cursor:not-allowed}
.pagination button.active{background:#fa8c16;color:#fff;border-color:#fa8c16}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:16px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#141414}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

@media (max-width:768px){
  .header-inner{flex-wrap:wrap;gap:8px;padding:0 12px}
  .header-logo{width:100%;text-align:center;justify-content:center}
  .header-search{max-width:100%;order:3}
  .header-info{display:none}
  .container{padding:0 12px 120px}
  .platform-bar-inner{padding:0 8px;gap:0}
  .platform-tab{padding:6px 8px;font-size:11px}
  .player-bar{padding:6px 12px;gap:8px}
  .player-info{display:none}
  .player-progress{max-width:100px}
  .player-volume{display:none}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-logo">
      <span>🎵 卡塔音乐</span>
      <div><small>制作人：卡塔biubiubiu | QQ：3424409635</small></div>
    </div>
    <div class="header-search">
      <input type="text" id="searchInput" placeholder="搜索歌曲、歌手..." autofocus>
      <button class="header-search-btn" onclick="doSearch(1)">🔍</button>
    </div>
    <div class="header-info">
      <button class="about-btn" onclick="openAbout()">💛 了解更多</button>
    </div>
  </div>
</div>

<div class="platform-bar">
  <div class="platform-bar-inner" id="platformTabs">
    {% for key, p in platforms.items() %}
    <button class="platform-tab{% if key == 'netease' %} active{% endif %}" data-platform="{{ key }}">
      {{ p.icon }} {{ p.name }}
    </button>
    {% endfor %}
  </div>
</div>

<div class="container">
  <div class="search-bar">
    <button class="mode-btn active" data-sort="name" onclick="switchSort('name',this)">按名称</button>
    <button class="mode-btn" data-sort="heat" onclick="switchSort('heat',this)">🔥 按热度</button>
    <button class="mode-btn" onclick="switchSection('ncm')">🔓 NCM解密</button>
    <span class="extra-link"></span>
  </div>

  <div class="upload-zone" id="ncmZone" style="display:none">
    <p>📂 点击或拖拽 .ncm 文件到这里解密</p>
    <p style="font-size:11px;color:#434343;">自动识别 FLAC/MP3 · 支持批量</p>
    <input type="file" id="ncmFile" accept=".ncm" multiple>
  </div>

  <div style="text-align:center;font-size:12px;color:#595959;margin-bottom:12px" id="resultCount"></div>
  <ul class="song-list" id="songList"></ul>
  <div id="loadingArea" class="loading" style="display:none"><div class="spinner"></div><p>搜索中...</p></div>
  <div id="emptyState" class="empty"><div class="icon">🎧</div><p>输入关键词搜索音乐</p></div>
  <div class="pagination" id="pagination" style="display:none"></div>
</div>

<div class="player-bar" id="playerBar">
  <img class="player-cover" id="playerCover" src="" alt="">
  <div class="player-info">
    <div class="p-title" id="playerTitle">未在播放</div>
    <div class="p-artist" id="playerArtist">—</div>
  </div>
  <div class="player-controls">
    <button onclick="playerPrev()" title="上一首">⏮</button>
    <button class="play-btn" id="playerPlayBtn" onclick="playerToggle()">▶️</button>
    <button onclick="playerNext()" title="下一首">⏭</button>
  </div>
  <div class="player-progress">
    <span class="player-time" id="playerCurTime">00:00</span>
    <input type="range" id="playerSeek" min="0" max="100" value="0" oninput="playerSeekTo(this.value)">
    <span class="player-time" id="playerDur">00:00</span>
  </div>
  <div class="player-volume">
    <span style="font-size:14px;flex-shrink:0">🔊</span>
    <input type="range" id="playerVol" min="0" max="100" value="70" oninput="playerSetVol(this.value)">
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// State
// ============================================================
let curSort = 'name';
let curPlatform = 'netease';
let curPage = 1, curQuery = '', curSection = 'search', curTotal = 0;
let audio = new Audio();
var currentSong = null;  // {songId, platform, title, artist, cover}

let playlist = [], playIdx = -1;

// ============================================================
// Init
// ============================================================
document.getElementById('searchInput').addEventListener('keydown', function(e) { if (e.key==='Enter') doSearch(1); });
document.getElementById('platformTabs').addEventListener('click', function(e) {
  const b = e.target.closest('.platform-tab');
  if (!b) return;
  document.querySelectorAll('.platform-tab').forEach(function(t) { t.classList.remove('active'); });
  b.classList.add('active');
  curPlatform = b.dataset.platform;
  if (curQuery) doSearch(1);
});

const ncmZ = document.getElementById('ncmZone');
ncmZ.addEventListener('dragover', function(e) { e.preventDefault(); ncmZ.classList.add('drag-over'); });
ncmZ.addEventListener('dragleave', function() { ncmZ.classList.remove('drag-over'); });
ncmZ.addEventListener('drop', function(e) {
  e.preventDefault(); ncmZ.classList.remove('drag-over');
  if (e.dataTransfer.files.length) { document.getElementById('ncmFile').files = e.dataTransfer.files; uploadNcm(); }
});
ncmZ.addEventListener('click', function() { document.getElementById('ncmFile').click(); });
document.getElementById('ncmFile').addEventListener('change', uploadNcm);

audio.addEventListener('timeupdate', function() {
  const pct = audio.duration ? (audio.currentTime/audio.duration)*100 : 0;
  const seek = document.getElementById('playerSeek');
  seek.value = pct;
  seek.style.setProperty('--seek-pct', pct + '%');
  document.getElementById('playerCurTime').textContent = fmtTime(audio.currentTime);
});
audio.addEventListener('loadedmetadata', function() {
  document.getElementById('playerDur').textContent = fmtTime(audio.duration);
});
audio.addEventListener('play', function() { document.getElementById('playerPlayBtn').textContent = '⏸'; });
audio.addEventListener('pause', function() { document.getElementById('playerPlayBtn').textContent = '▶️'; });
audio.addEventListener('ended', function() { playerNext(); });
audio.volume = 0.7;

// ============================================================
// Helpers
// ============================================================
function toast(m, ms) { ms = ms || 2500; const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');}, ms); }
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

const coverRetryMap = {};
async function retryCover(img, songId, platform) {
  const row = img.closest('.song-row');
  const titleEl = row ? row.querySelector('.title') : null;
  const metaEl = row ? row.querySelector('.meta') : null;
  const title = titleEl ? titleEl.textContent.trim() : '';
  const artist = metaEl ? metaEl.textContent.trim() : '';
  await fetchCoverForSong(songId, platform, title, artist);
  const key = songId + '@' + platform;
  if (coverRetryMap[key] && coverRetryMap[key] !== 'failed') {
    if (img.tagName === 'IMG') {
      img.src = coverRetryMap[key];
    } else {
      var newImg = document.createElement('img');
      newImg.className = 'song-cover';
      newImg.src = coverRetryMap[key];
      newImg.loading = 'lazy';
      img.parentNode.replaceChild(newImg, img);
    }
  } else {
    coverRetryMap[key] = 'failed';
  }
}
function fmtTime(s) { if (!s||isNaN(s)) return '00:00'; const m=Math.floor(s/60), sec=Math.floor(s%60); return m+':'+sec.toString().padStart(2,'0'); }

function switchSort(sort, btn) {
  curSort = sort;
  curSection = 'search';
  document.querySelectorAll('.mode-btn[data-sort]').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('searchInput').placeholder = '搜索歌曲、歌手...';
  // Restore search view
  document.getElementById('ncmZone').style.display = 'none';
  document.getElementById('songList').style.display = '';
  document.getElementById('emptyState').style.display = (playlist && playlist.length) ? 'none' : 'block';
  document.getElementById('pagination').style.display = curTotal > 20 ? 'flex' : 'none';
  document.getElementById('resultCount').style.display = '';
  // Re-sort and re-render if we have results
  if (playlist && playlist.length) {
    // Sync any cached covers into playlist before rendering
    for (var i = 0; i < playlist.length; i++) {
      var s = playlist[i];
      if (!s.cover || !s.cover.startsWith('http')) {
        var key = s.id + '@' + s.platform;
        var cached = coverRetryMap[key];
        if (cached && cached !== 'failed') {
          s.cover = cached;
        }
      }
    }
    renderSongs(playlist);
  }
}
function switchSection(s) {
  curSection = s;
  var isNcm = s === 'ncm';
  document.getElementById('ncmZone').style.display = isNcm ? 'block' : 'none';
  document.getElementById('songList').style.display = isNcm ? 'none' : '';
  document.getElementById('emptyState').style.display = isNcm ? 'none' : (playlist && playlist.length ? 'none' : 'block');
  document.getElementById('pagination').style.display = isNcm ? 'none' : (curTotal > 20 ? 'flex' : 'none');
  document.getElementById('resultCount').style.display = isNcm ? 'none' : '';
  if (!isNcm) document.getElementById('searchInput').focus();
}

// ============================================================
// Search
// ============================================================
async function doSearch(page) {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  curQuery = q; curPage = page; curSection = 'search';
  document.getElementById('loadingArea').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('songList').innerHTML = '';
  document.getElementById('ncmZone').style.display = 'none';

  try {
    const resp = await fetch('/api/search?q='+encodeURIComponent(q)+'&platform='+curPlatform+'&filter=name&page='+page);
    const data = await resp.json();
    if (data.error) { document.getElementById('songList').innerHTML='<div class="error-box"><h3>搜索失败</h3><p>'+esc(data.error)+'</p></div>'; return; }
    playlist = data.songs;
    renderSongs(data.songs);
    curTotal = data.total || 0;
    document.getElementById('resultCount').textContent = curTotal ? '找到 '+curTotal+' 首' : '';
    renderPagination(page);
  } catch(e) {
    document.getElementById('songList').innerHTML = '<div class="error-box"><h3>搜索失败</h3><p>'+esc(e.message)+'</p></div>';
  } finally {
    document.getElementById('loadingArea').style.display = 'none';
  }
}

function fmtHeat(n) {
  if (!n || n < 1) return '';
  if (n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'')+'M';
  if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'')+'k';
  return n.toLocaleString();
}

function renderSongs(songs) {
  const list = document.getElementById('songList');
  if (!songs.length) { list.innerHTML='<div class="empty"><div class="icon">😕</div><p>无结果</p></div>'; return; }

  // Sort by heat if requested
  var sorted = songs.slice();
  if (curSort === 'heat') {
    sorted.sort(function(a, b) { return (b.heat||0) - (a.heat||0); });
  }

  list.innerHTML = sorted.map(function(s,i) {
    var idx = songs.indexOf(s);  // original index for toggleSong
    var coverHtml = s.cover && s.cover.startsWith('http') ? '<img class="song-cover" src="'+esc(s.cover)+'" loading="lazy">' : '<div class="song-cover" style="display:flex;align-items:center;justify-content:center;color:#595959;font-size:18px;font-weight:bold;flex-shrink:0">🎵</div>';
    var heatHtml = (s.heat && s.heat > 0) ? '<span class="song-heat">🔥 '+fmtHeat(s.heat)+'</span>' : '';
    return '<li class="song-item" id="song-'+s.id+'">'+
      '<div class="song-row" onclick="toggleSong(\''+s.id+'\',\''+s.platform+'\','+idx+')">'+
        '<span class="song-idx">'+(i+1)+'</span>'+
        coverHtml+
        '<div class="song-info">'+
          '<div class="title">'+esc(s.title)+'</div>'+
          '<div class="meta">'+esc(s.artist)+'</div>'+
        '</div>'+
        heatHtml+
        '<span class="song-platform-tag">'+esc(s.platform_name||s.platform)+'</span>'+
        '<span class="song-arrow">▼</span>'+
      '</div>'+
      '<div class="song-detail" id="detail-'+s.id+'"><div style="text-align:center;padding:12px;color:#595959;">加载中...</div></div>'+
    '</li>';
  }).join('');
  // Auto-fetch missing covers
  songs.forEach(function(s) {
    if (!s.cover || !s.cover.startsWith('http')) {
      fetchCoverForSong(s.id, s.platform, s.title, s.artist);
    }
  });
}

async function fetchCoverForSong(songId, platform, title, artist) {
  const key = songId + '@' + platform;
  if (coverRetryMap[key]) return;
  try {
    let url = '/api/song/'+platform+'/'+songId;
    if (title) url += '?title='+encodeURIComponent(title)+'&artist='+encodeURIComponent(artist||'');
    const resp = await fetch(url);
    const d = await resp.json();
    if (d.cover && d.cover.startsWith('http')) {
      coverRetryMap[key] = d.cover;
      // Also update playlist entry so re-renders pick up the cover
      for (var pi = 0; pi < playlist.length; pi++) {
        if (playlist[pi].id === songId && playlist[pi].platform === platform) {
          playlist[pi].cover = d.cover;
          break;
        }
      }
      // Update visible DOM elements
      document.querySelectorAll('#song-'+songId+' .song-cover').forEach(function(el) {
        if (el.tagName === 'IMG') {
          el.src = d.cover;
        } else {
          var img = document.createElement('img');
          img.className = 'song-cover';
          img.src = d.cover;
          img.loading = 'lazy';
          img.alt = title || '';
          el.parentNode.replaceChild(img, el);
        }
      });
    }
  } catch(e) {}
}

async function toggleSong(songId, platform, idx) {
  const item = document.getElementById('song-'+songId);
  const detail = document.getElementById('detail-'+songId);
  if (item.classList.contains('expanded')) { item.classList.remove('expanded'); return; }
  document.querySelectorAll('.song-item.expanded').forEach(function(e){e.classList.remove('expanded');});
  item.classList.add('expanded');

  // Stop any currently playing audio and reset state
  audio.pause();
  audio.src = '';
  document.getElementById('playerPlayBtn').textContent = '▶️';

  // Show player bar and update info
  document.getElementById('playerBar').classList.add('visible');
  playIdx = idx;
  var song = playlist[idx];
  if (song) {
    currentSong = {songId: songId, platform: platform, title: song.title, artist: song.artist, cover: song.cover||'', duration: song.duration||0};
    document.getElementById('playerTitle').textContent = song.title || 'Unknown';
    document.getElementById('playerArtist').textContent = song.artist || 'Unknown';
    // Show duration from search result
    var durMs = song.duration || 0;
    document.getElementById('playerDur').textContent = fmtTime(durMs / 1000);
    document.getElementById('playerCurTime').textContent = '00:00';
    document.getElementById('playerSeek').value = 0;
    document.getElementById('playerSeek').style.setProperty('--seek-pct', '0%');
    if (song.cover && song.cover.startsWith('http')) {
      document.getElementById('playerCover').src = song.cover;
    } else {
      loadPlayerCover(songId, platform);
    }
  }

  if (detail.dataset.loaded!=='1') {
    try {
      const song = playlist[idx];
      const lrc = song.lyric || '';
      const tEnc = encodeURIComponent(song.title||'');
      const aEnc = encodeURIComponent(song.artist||'');
      detail.innerHTML =
        '<div class="detail-actions">'+
          '<button class="btn btn-primary dl-btn" data-sid="'+songId+'" data-plat="'+platform+'">⬇ 下载 MP3</button>'+
          '<button class="btn btn-outline btn-sm lrc-btn" data-sid="'+songId+'" data-plat="'+platform+'">📝 下载LRC歌词</button>'+
          '<select class="lrc-lang-select">'+
            '<option value="">不翻译</option>'+
            '<option value="zh">翻译为中文</option>'+
            '<option value="en">翻译为英文</option>'+
          '</select>'+
          (lrc ? '<button class="btn btn-outline btn-sm" onclick="toggleLyrics(\''+songId+'\')">👁 预览歌词</button>' : '')+
        '</div>'+
        '<div class="lrc-progress" id="lrc-progress-'+songId+'"><div class="bar"></div><div class="label">翻译中...</div></div>'+
        '<div class="detail-url">ID: '+songId+' | <a href="'+(song.link||'#')+'" target="_blank">源页面 ↗</a></div>'+
        (lrc ? '<div class="lyrics-panel" id="lyrics-'+songId+'">'+esc(lrc).replace(/\n/g,'<br>')+'</div>' : '');
      detail.dataset.loaded = '1';

      // Attach event listeners
      detail.querySelector('.dl-btn').addEventListener('click', function() {
        downloadSong(songId, platform, song.title, song.artist);
      });
      detail.querySelector('.lrc-btn').addEventListener('click', function() {
        downloadLrc(songId, platform, song.title, song.artist);
      });
    } catch(e) {
      detail.innerHTML = '<div class="error-box">加载失败: '+esc(e.message)+'</div>';
    }
  }
}

function toggleLyrics(songId) { document.getElementById('lyrics-'+songId).classList.toggle('show'); }

async function downloadLrc(songId, platform, title, artist) {
  // Find the associated language selector
  var detailEl = document.getElementById('detail-'+songId);
  var sel = detailEl ? detailEl.querySelector('.lrc-lang-select') : null;
  var translateLang = sel ? sel.value : '';

  var url = '/api/lrc/'+platform+'/'+songId;
  if (title && title !== 'Unknown') url += '?title='+encodeURIComponent(title)+'&artist='+encodeURIComponent(artist||'');
  if (translateLang) url += '&translate='+encodeURIComponent(translateLang);

  if (translateLang) {
    // Translation route: use fetch so we can show progress
    var progressEl = document.getElementById('lrc-progress-'+songId);
    if (progressEl) {
      progressEl.classList.add('active');
      progressEl.querySelector('.label').textContent = '翻译中...';
    }

    try {
      var resp = await fetch(url);
      if (!resp.ok) {
        var errData = null;
        try { errData = await resp.json(); } catch(e) {}
        throw new Error((errData && errData.error) || '翻译失败 (HTTP '+resp.status+')');
      }
      var blob = await resp.blob();

      if (progressEl) {
        progressEl.querySelector('.label').textContent = '翻译完成，开始下载...';
        await new Promise(function(r) { setTimeout(r, 400); });
      }

      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      var disp = resp.headers.get('Content-Disposition')||'';
      var fname = null;
      var starMatch = disp.match(/filename\*=UTF-8''([^;]*)/);
      if (starMatch) {
        try { fname = decodeURIComponent(starMatch[1]); } catch(e) { fname = null; }
      }
      if (!fname) {
        var plainMatch = disp.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
        fname = plainMatch ? plainMatch[1].replace(/['"]/g,'') : 'song.lrc';
      }
      a.download = fname;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(a.href);

      var langLabel = translateLang==='zh' ? '中文' : '英文';
      toast('✅ 翻译完成 ('+langLabel+')，LRC 已下载');
    } catch(e) {
      toast('❌ 翻译失败: '+e.message);
    } finally {
      if (progressEl) progressEl.classList.remove('active');
    }
  } else {
    // No translation: original direct download behavior
    var a = document.createElement('a');
    a.href = url;
    a.download = '';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast('📝 LRC 歌词下载已开始');
  }
}

// Player
// ============================================================
async function playSong(songId, platform, title, artist, cover) {
  toast('正在获取音源...');
  try {
    const resp = await fetch('/api/p/'+songId+'?platform='+platform+'&id='+songId);
    const data = await resp.json();
    if (data.success && data.url) {
      audio.src = data.url;
      audio.play().catch(function(e){toast('播放失败: '+e.message)});
      document.getElementById('playerTitle').textContent = title;
      document.getElementById('playerArtist').textContent = artist;
      if (cover && cover.startsWith('http')) {
        document.getElementById('playerCover').src = cover;
      } else {
        loadPlayerCover(songId, platform);
      }
      toast('▶ 正在播放: ' + title);
    } else {
      toast('⚠ 该歌曲暂无可用音源');
    }
  } catch(e) {
    toast('❌ 获取音源失败: ' + e.message);
  }
}

async function loadPlayerCover(songId, platform) {
  try {
    const resp = await fetch('/api/song/'+platform+'/'+songId);
    const d = await resp.json();
    if (d.cover && d.cover.startsWith('http')) {
      document.getElementById('playerCover').src = d.cover;
    }
  } catch(e) {}
}

async function playerToggle() {
  // If no song source loaded yet, load the current song first
  if (!audio.src || audio.src === window.location.href) {
    if (!currentSong) { toast('请先选择一首歌曲'); return; }
    await playCurrentSong();
    return;
  }
  if (audio.paused) {
    // Apply seek bar position before playing
    var seek = document.getElementById('playerSeek');
    if (audio.duration && seek.value > 0) {
      audio.currentTime = (seek.value / 100) * audio.duration;
    }
    audio.play().catch(function(e){toast('播放失败: '+e.message)});
  } else {
    audio.pause();
  }
}

async function playCurrentSong() {
  if (!currentSong) return;
  var cs = currentSong;
  toast('正在获取音源...');
  try {
    var resp = await fetch('/api/p/'+cs.songId+'?platform='+cs.platform+'&id='+cs.songId);
    var data = await resp.json();
    if (data.success && data.url) {
      audio.src = data.url;
      // Respect seek bar position
      var seek = document.getElementById('playerSeek');
      var seekPct = parseFloat(seek.value) || 0;
      if (seekPct > 0) {
        await new Promise(function(resolve) {
          var timeout = setTimeout(resolve, 4000);
          var onMeta = function() {
            clearTimeout(timeout);
            audio.removeEventListener('loadedmetadata', onMeta);
            audio.currentTime = (seekPct / 100) * audio.duration;
            resolve();
          };
          audio.addEventListener('loadedmetadata', onMeta);
        });
      }
      audio.play().catch(function(e){toast('播放失败: '+e.message)});
      document.getElementById('playerTitle').textContent = cs.title;
      document.getElementById('playerArtist').textContent = cs.artist;
      toast('▶ 正在播放: ' + cs.title);
    } else {
      toast('⚠ 暂无可用音源，请再次点击播放按钮重试');
    }
  } catch(e) {
    toast('❌ 获取失败，请再次点击播放按钮重试');
  }
}

function playerSeekTo(v) {
  document.getElementById('playerSeek').style.setProperty('--seek-pct', v+'%');
  if (audio.duration) {
    audio.currentTime = (v/100)*audio.duration;
    document.getElementById('playerCurTime').textContent = fmtTime(audio.currentTime);
  } else {
    // Show seek preview even before audio is loaded
    var dur = currentSong && currentSong.duration ? currentSong.duration / 1000 : 0;
    if (dur) document.getElementById('playerCurTime').textContent = fmtTime((v/100)*dur);
  }
}
function playerSetVol(v) { audio.volume = v/100; }
async function playerPrev() {
  // Find current song index in displayed playlist (default to playIdx)
  var idx = -1;
  if (currentSong) {
    for (var i = 0; i < playlist.length; i++) {
      if (playlist[i].id === currentSong.songId && playlist[i].platform === currentSong.platform) {
        idx = i; break;
      }
    }
  }
  if (idx < 0 && playIdx >= 0) idx = playIdx;
  if (idx <= 0 || !playlist.length) { toast('已是第一首'); return; }
  var prev = playlist[idx - 1];
  await toggleSong(prev.id, prev.platform, idx - 1);
  // Scroll target into view
  var el = document.getElementById('song-'+prev.id);
  if (el) el.scrollIntoView({behavior:'smooth',block:'center'});
  // Auto-play the switched song
  playerToggle();
}
async function playerNext() {
  var idx = -1;
  if (currentSong) {
    for (var i = 0; i < playlist.length; i++) {
      if (playlist[i].id === currentSong.songId && playlist[i].platform === currentSong.platform) {
        idx = i; break;
      }
    }
  }
  if (idx < 0 && playIdx >= 0) idx = playIdx;
  if (idx < 0 || idx >= playlist.length - 1 || !playlist.length) { toast('已是最后一首'); return; }
  var next = playlist[idx + 1];
  await toggleSong(next.id, next.platform, idx + 1);
  var el = document.getElementById('song-'+next.id);
  if (el) el.scrollIntoView({behavior:'smooth',block:'center'});
  // Auto-play the switched song
  playerToggle();
}

// ============================================================
// Download
// ============================================================
async function downloadSong(songId, platform, title, artist) {
  toast('正在获取下载链接，请耐心等待...');
  try {
    let url = '/api/download/'+platform+'/'+songId;
    if (title && title !== 'Unknown') url += '?title='+encodeURIComponent(title)+'&artist='+encodeURIComponent(artist||'');
    const resp = await fetch(url);
    const contentType = resp.headers.get('Content-Type') || '';

    if (resp.ok && (contentType.includes('audio') || contentType.includes('octet-stream'))) {
      const blob = await resp.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      const disp = resp.headers.get('Content-Disposition')||'';
      // RFC 5987: filename*=UTF-8''percent-encoded — prefer over ASCII filename=
      var fname = null;
      var starMatch = disp.match(/filename\*=UTF-8''([^;]*)/);
      if (starMatch) {
        try { fname = decodeURIComponent(starMatch[1]); } catch(e) { fname = null; }
      }
      if (!fname) {
        var plainMatch = disp.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
        fname = plainMatch ? plainMatch[1].replace(/['"]/g,'') : 'song.mp3';
      }
      a.download = fname;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
      toast('✅ 下载成功！');
    } else if (!resp.ok) {
      const err = await resp.json();
      toast('❌ '+((err||{}).error||'下载失败')+': '+(err.detail||''));
    } else {
      toast('⚠ 未知响应格式');
    }
  } catch(e) { toast('❌ 下载失败: '+e.message); }
}

// ============================================================
// NCM Upload
// ============================================================
async function uploadNcm() {
  const files = document.getElementById('ncmFile').files;
  if (!files.length) return;
  for (const file of files) {
    const fd = new FormData(); fd.append('file', file);
    try {
      const resp = await fetch('/api/ncm/decrypt', {method:'POST', body:fd});
      if (resp.ok) {
        const blob = await resp.blob(), a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = file.name.replace('.ncm','.mp3');
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
        toast('✅ '+file.name+' 解密成功');
      } else { const e = await resp.json(); toast('❌ '+file.name+': '+e.error); }
    } catch(e) { toast('❌ '+file.name+': '+e.message); }
  }
  document.getElementById('ncmFile').value = '';
}

function renderPagination(page) {
  const pg = document.getElementById('pagination');
  const perPage = 20;
  const totalPages = Math.max(1, Math.ceil(curTotal / perPage));
  if (totalPages <= 1) { pg.style.display = 'none'; return; }

  let html = '<button '+(page<=1?'disabled':'')+' onclick="doSearch('+(page-1)+')">‹ 上一页</button>';
  const pagesToShow = [];
  if (totalPages <= 8) {
    for (let i=1; i<=totalPages; i++) pagesToShow.push(i);
  } else {
    pagesToShow.push(1,2,3);
    if (page > 4) pagesToShow.push('...');
    for (let i=Math.max(4, page-1); i<=Math.min(totalPages-3, page+1); i++) pagesToShow.push(i);
    if (page < totalPages-3) pagesToShow.push('...');
    pagesToShow.push(totalPages-1, totalPages);
  }

  for (const p of pagesToShow) {
    if (p === '...') {
      html += '<span style="padding:6px 4px;color:#595959">…</span>';
    } else {
      html += '<button class="'+(p===page?'active':'')+'" onclick="doSearch('+p+')">'+p+'</button>';
    }
  }

  html += '<input type="number" id="jumpPage" min="1" max="'+totalPages+'" value="'+page+'" style="width:50px;text-align:center;background:#1f1f1f;color:#d9d9d9;border:1px solid #333;border-radius:16px;padding:6px 8px;font-size:12px" onkeydown="if(event.key===\'Enter\'){const v=parseInt(this.value); if(v>=1)doSearch(v)}">'+
    '<button onclick="var v=parseInt(document.getElementById(\'jumpPage\').value); if(v>=1)doSearch(v)" style="padding:6px 12px;background:#fa8c16;color:#fff;border:none;border-radius:16px;cursor:pointer;font-size:12px">跳转</button>';

  html += '<button '+(page>=totalPages?'disabled':'')+' onclick="doSearch('+(page+1)+')">下一页 ›</button>';
  pg.innerHTML = html;
  pg.style.display = 'flex';
}
